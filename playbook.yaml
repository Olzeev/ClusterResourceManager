# playbook.yml
- name: Configure Pacemaker cluster with master/slave resources
  hosts: localhost
  connection: local

  tasks:
    - name: Ensure cluster is running
      command: pcs status
      register: cluster_status
      changed_when: false
      failed_when: false

    - name: Create promotable resource res1
      resource_manager:
        name: res1
        op_type: create
        type: promotable
      register: result

    - name: show result
      debug:
        var: result
  
    - name: Create resource res2
      resource_manager:
        name: res2
        op_type: create
        type: primitive
        state: disabled
      register: result

    - name: show result
      debug:
        var: result

    - name: Add constraint on start
      constraint_manager:
        op_type: create
        constraint_type: order
        action_1: start
        action_1_resource: res1-clone
        action_2: start
        action_2_resource: res2
      register: result

    - name: show result
      debug:
        var: result

    - name: Add constraint on promote
      constraint_manager:
        op_type: create
        constraint_type: order
        action_1: start
        action_1_resource: res2
        action_2: promote
        action_2_resource: res1-clone
      register: result

    - name: show result
      debug:
        var: result
    - name: Add colocation constraint
      constraint_manager:
        op_type: create
        constraint_type: colocation
        action_1: promoted
        action_1_resource: res1-clone
        action_2_resource: res2
      register: result
    - name: show result
      debug:
        var: result