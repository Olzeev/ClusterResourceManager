# playbook.yml
- name: Configure Pacemaker cluster with master/slave resources
  hosts: localhost
  connection: local

  tasks:
    - name: Ensure cluster is running
      command: pcs status
      register: cluster_status
      changed_when: false
      failed_when: false

    - name: Delete res1
      resource_manager:
        name: res1
        op_type: delete
        timeout: 10
      register: result

    - name: show result
      debug:
        var: result

    - name: Create resource res1
      resource_manager:
        name: res1
        op_type: create
        type: primitive
        operations:
          - action: monitor
            interval: 60s
            timeout: 10s
            on_fail: stop
        meta_attrs:
          target-role: Started
      register: result

    - name: show result
      debug:
        var: result