# playbook.yml
- name: Configure Pacemaker cluster with master/slave resources
  hosts: localhost
  connection: local
  gather_facts: yes

  tasks:
    - name: Ensure cluster is running
      command: pcs status
      register: cluster_status
      changed_when: false
      failed_when: false

    - name: Create promotable (master/slave) resource res1
      pacemaker_resource:
        name: res1
        agent: ocf:pacemaker:Stateful
        resource_type: promotable
        operations:
          - action: start
            timeout: 60s
            on_fail: restart
          - action: stop
            timeout: 60s
            on_fail: block
          - action: monitor
            interval: 10s
            timeout: 20s
            on_fail: restart
          - action: promote
            timeout: 60s
            on_fail: restart
          - action: demote
            timeout: 60s
            on_fail: stop
        meta_attrs:
          promoted_max: 1
      register: res1_created

    - name: Create dummy resource res2
      pacemaker_resource:
        name: res2
        agent: ocf:heartbeat:Dummy
        operations:
          - action: start
            timeout: 30s
            on_fail: restart
          - action: stop
            timeout: 30s
            on_fail: ignore
          - action: monitor
            interval: 10s
            timeout: 20s
            on_fail: restart
      register: res2_created

    - name: Add order constraint (res1 slave -> res2 start)
      pacemaker_constraint:
        type: order
        resources: [res1, res2]
        actions: [start, start]
        kind: Mandatory
      register: order1

    - name: Add order constraint (res2 start -> res1 promote)
      pacemaker_constraint:
        type: order
        resources: [res2, res1]
        actions: [start, promote]
        kind: Mandatory
      register: order2

    - name: Add colocation constraint (res2 with promoted res1)
      pacemaker_constraint:
        type: colocation
        resources: [res2, res1]
        role: promoted
        score: INFINITY
      register: colocation

    - name: Wait for cluster stabilization
      pause:
        seconds: 5

    - name: Show cluster status
      command: pcs status
      register: status
      changed_when: false

    - name: Display cluster status
      debug:
        var: status.stdout_lines